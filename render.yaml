services:
  - type: web
    name: aws-lab-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: CYBERRANGE_API_URL
        value: https://cyberrange-api-l294.onrender.com
      - key: JWT_SECRET
        generateValue: true
